<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onkbaonk Hub - V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="p-4 md:p-8 bg-[#0f172a] text-slate-200">

    <div id="comp-modals"></div>

    <div class="max-w-4xl mx-auto">
        <header id="comp-header" class="flex justify-between items-center mb-2"></header>
        <nav id="comp-navigation" class="flex border-b border-white/10 mb-6 gap-6 overflow-x-auto sticky top-0 bg-[#0f172a] z-30"></nav>

        <main id="main-content">
            <div id="section-blog" class="tab-content"></div>
            <div id="section-categories" class="tab-content hidden"></div>
            <div id="section-chat" class="tab-content hidden"></div>
            <div id="section-stats" class="tab-content hidden"></div>
            <div id="section-profile" class="tab-content hidden"></div>
        </main>
    </div>
    <script type="module" src="./assets/js/main.js"></script>
<script>
async function loadComponent(id, path) {
    try {
        const res = await fetch(path);
        const html = await res.text();
        document.getElementById(id).innerHTML = html;
    } catch (e) { 
        console.error(e);
    }
}

async function initApp() {
    // load semua komponen dulu
    await Promise.all([
        loadComponent('comp-modals', './components/modals.html'),
        loadComponent('comp-header', './components/header.html'),
        loadComponent('comp-navigation', './components/navigation.html'),
        loadComponent('section-blog', './components/section-blog.html'),
        loadComponent('section-categories', './components/section-categories.html'),
        loadComponent('section-chat', './components/section-chat.html'),
        loadComponent('section-stats', './components/section-stats.html'),
        loadComponent('section-profile', './components/section-profile.html')
    ]);

    // 🔥 setelah semua siap → trigger event biar main.js jalan
    window.dispatchEvent(new Event("app-ready"));
}

initApp();
</script>
</body>
</html>
